# Shared advisory git hooks for the cshuttle/* homelab (Lefthook).
#
# Referenced by each repo's lefthook.yml via `remotes:` — define once here,
# every repo points at it. These are a local safety net mirroring the spirit of
# CI (server-side branch protection isn't available on the Free GitHub plan).
#
# Per clone:  lefthook install   (re-run after a pre-push change to wire the hook)
# Tools on PATH: shellcheck, gitleaks, yamllint (pre-commit);
#                kustomize, helm, kubeconform (pre-push, GitOps repos only).
pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "*.sh"
      run: shellcheck {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact --no-banner
    yaml-lint:
      glob: "*.{yml,yaml}"
      # SOPS-encrypted / Helm-templated files aren't plain YAML
      exclude: '\.(age|sops\.ya?ml)$|/templates/'
      # relaxed + line-length off: keep real errors (syntax, dup keys) but drop
      # the noisy "line too long" warnings (helm values, URLs, long comments).
      run: 'yamllint -d "{extends: relaxed, rules: {line-length: disable}}" {staged_files}'
    whitespace-conflicts:
      # built-in: flags conflict markers + trailing whitespace, no extra tool
      run: git diff --cached --check

# Heavier checks run before push (not on every commit). The kustomize render is
# the local twin of the kustomize-validate CI workflow — same script. No-ops in
# repos without kustomizations or without the tools, and skips on a fetch
# failure, so it never blocks a push for environmental reasons (advisory).
pre-push:
  commands:
    kustomize-validate:
      run: |
        s="${TMPDIR:-/tmp}/cshuttle-kustomize-validate.sh"
        curl -sSfL https://raw.githubusercontent.com/cshuttle/workflows/main/scripts/kustomize-validate.sh -o "$s" \
          || { echo "kustomize-validate: could not fetch script — skip"; exit 0; }
        bash "$s" .
