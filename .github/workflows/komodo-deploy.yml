# Reusable Komodo stack deploy trigger — for self-building stacks.
#
# A repo whose CI builds its own ghcr `:latest` has no good redeploy event:
# git-push webhooks race the async image build (~90s early), and the
# auto_update digest poll lags by minutes (cshuttle/Topology#23; the
# estate-wide registry_package router is cshuttle/Komodo#120, currently blocked
# on Komodo Core's push-only listener parse). This workflow is the component
# that KNOWS the image is ready: call it as a final `needs: <build job>` job
# and it POSTs a push-shaped, HMAC-signed payload to the stack's existing
# Komodo deploy listener — the same endpoint a GitHub push webhook would hit,
# but fired only after the image push succeeded.
#
# Komodo Core listener contract (verified against v2.2.0,
# bin/core/src/api/listener/integrations/github.rs): the body only needs
# {"ref":"refs/heads/<branch>"}; the signature is hex HMAC-SHA256 of the raw
# body in X-Hub-Signature-256 ("sha256=" prefix optional), keyed with Core's
# global webhook secret. Komodo deploys only when <branch> matches the stack's
# configured branch — the caller's real branch is sent, so a run from any
# other branch is a Komodo-side no-op by design.
#
# Fire-and-forget: the listener 200s immediately and processes async, so a
# branch mismatch or Komodo-side deploy failure is NOT visible here (a bad
# signature or unreachable listener IS — the job fails). Keep the stack's
# auto_update = true as the backstop for a missed trigger.
#
# Caller (repo must be granted the org Actions secret KOMODO_WEBHOOK_SECRET;
# source of truth: bws "Komodo GitHub Webhook Secret"):
#
#   deploy:
#     needs: build
#     if: github.ref == 'refs/heads/main'
#     uses: cshuttle/workflows/.github/workflows/komodo-deploy.yml@main
#     with:
#       stack-id: <24-hex komodo stack id>  # <stack name>
#       listener-base: https://<komodo webhook listener host>
#       runner: arc-<repo>   # the repo's ARC runner scale set
#     secrets:
#       KOMODO_WEBHOOK_SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
#
# listener-base is a required input (not a default) on purpose: this repo is
# public and carries no estate hostnames — the caller repo names its listener.

name: komodo-deploy

# Least privilege: the job never checks out the repo or touches the API.
permissions: {}

on:
  workflow_call:
    inputs:
      stack-id:
        description: >-
          Komodo stack id (the 24-hex id in the stack's URL). The deploy
          listener is keyed by id, not name — a name would need a Komodo API
          key to resolve, which this workflow deliberately avoids.
        type: string
        required: true
      runner:
        description: >-
          runs-on target. Defaults to GitHub-hosted ubuntu-latest; repos pass
          their ARC runner scale set (`arc-<repo>`, on the main k8s cluster)
          to keep this off metered minutes.
        type: string
        default: ubuntu-latest
        required: false
      listener-base:
        description: >-
          Komodo webhook listener base URL (scheme + host, no trailing slash).
          Required — this public repo carries no estate hostnames.
        type: string
        required: true
    secrets:
      KOMODO_WEBHOOK_SECRET:
        description: >-
          Komodo Core's shared webhook HMAC secret (org Actions secret; source
          of truth in bws "Komodo GitHub Webhook Secret").
        required: true

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Trigger Komodo DeployStack
        env:
          SECRET: ${{ secrets.KOMODO_WEBHOOK_SECRET }}
          STACK_ID: ${{ inputs.stack-id }}
          BASE: ${{ inputs.listener-base }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          body=$(printf '{"ref":"refs/heads/%s"}' "$BRANCH")
          sig=$(printf '%s' "$body" | openssl dgst -sha256 -hmac "$SECRET" -hex | sed 's/^.* //')
          curl -fsS --retry 3 --retry-delay 5 --max-time 30 \
            -X POST "$BASE/listener/github/stack/$STACK_ID/deploy" \
            -H "content-type: application/json" \
            -H "x-hub-signature-256: sha256=$sig" \
            --data "$body"
          echo "Deploy listener accepted (fire-and-forget) — verify via the stack's DeployStack update in Komodo."
