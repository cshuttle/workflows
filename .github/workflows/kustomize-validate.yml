# Reusable kustomize render + schema validation.
#
# Builds every kustomization root in the caller's checkout with
# `kustomize build --enable-helm` and schema-validates the output with
# kubeconform. Catches a commit that breaks a render before ArgoCD pulls it.
#
# Callers (one per GitOps content repo) need nothing but:
#
#   jobs:
#     kustomize:
#       uses: cshuttle/workflows/.github/workflows/kustomize-validate.yml@main
#
# The content repos are self-contained (their cross-repo references are ArgoCD
# `repoURL` data, not kustomize remote bases), so a plain self-checkout renders
# them — no submodules or PAT required, unlike the umbrella's submodule-smoke.
name: kustomize-validate

# Least privilege: the validation only reads the checkout and fetches public
# tooling — it never needs write access to the caller repo or its secrets.
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      paths:
        description: Space-separated roots to scan for kustomization.yaml
        type: string
        default: "."

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      KUSTOMIZE_VERSION: v5.7.0
      KUBECONFORM_VERSION: v0.6.7
      # Pin to Helm 3.x: kustomize v5.7.0 still probes with the deprecated
      # `helm version -c`, which Helm 4 removed. setup-helm defaults to the
      # latest (now Helm 4), so an unpinned install breaks every --enable-helm
      # render with "unknown shorthand flag: 'c' in -c".
      HELM_VERSION: v3.21.1
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4   # `kustomize build --enable-helm` needs helm on PATH
        with:
          version: ${{ env.HELM_VERSION }}

      - name: install kustomize + kubeconform
        run: |
          curl -sSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar xz
          sudo install -m 0755 kustomize /usr/local/bin/kustomize
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform

      - name: build + validate all kustomization roots
        # Same script the Lefthook pre-push hook runs locally — single source of
        # truth (scripts/kustomize-validate.sh in this repo).
        run: |
          curl -sSfL https://raw.githubusercontent.com/cshuttle/workflows/main/scripts/kustomize-validate.sh -o /tmp/kustomize-validate.sh
          bash /tmp/kustomize-validate.sh ${{ inputs.paths }}
