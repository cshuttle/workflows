# Reusable GitGuardian (ggshield) secret scan.
#
# Runs `ggshield secret scan ci` over the caller's pushed/PR commit range so a
# leaked credential is caught *before* it merges — the pre-merge twin of the
# GitGuardian GitHub App, which only flags secrets retroactively after a push.
# Findings also land in the shared GitGuardian dashboard (policy + false-positive
# management live there — e.g. bws UUIDs are resolved as FPs in the dashboard,
# not ignored in code).
#
# Callers (one per repo) need the org Actions secret GITGUARDIAN_API_KEY and:
#
#   jobs:
#     ggshield:
#       uses: cshuttle/workflows/.github/workflows/ggshield-scan.yml@main
#       with:
#         runner: arc-<repo>   # the repo's ARC runner scale set (see cshuttle/management)
#       secrets: inherit
#
# `secrets: inherit` passes the org-level GITGUARDIAN_API_KEY through without
# re-declaring it per caller.
#
# ggshield is installed via pip (NOT the GitGuardian/ggshield-action Docker
# action): the ARC (actions-runner-controller) runner pods have no Docker daemon,
# so a container action can't run. actions/setup-python + pip is self-provisioning
# and works on both ARC and GitHub-hosted runners.
name: ggshield-scan

# Least privilege: the scan only reads the checkout + calls the GitGuardian API.
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      runner:
        description: >-
          runs-on target for the scan job. Defaults to the GitHub-hosted
          ubuntu-latest; repos pass their ARC runner scale set (`arc-<repo>`,
          on the main k8s cluster) to keep this off metered minutes.
        type: string
        default: ubuntu-latest
        required: false
    secrets:
      GITGUARDIAN_API_KEY:
        description: GitGuardian API key (scope `scan`); source of truth in bws Infrastructure.
        required: true

jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # ggshield diffs the commit range; it needs full history, not a shallow
          # clone, to resolve the base of a push or PR.
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install ggshield
        run: python -m pip install --upgrade ggshield

      - name: ggshield secret scan
        run: ggshield secret scan ci
        env:
          # ggshield reads these to compute the exact push/PR commit range to scan
          # (same vars the ggshield-action used; see GitGuardian's Actions docs).
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
